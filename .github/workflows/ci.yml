name: CI Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests and Quality Checks
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.12"

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          if (Test-Path requirements-dev.txt) {
            pip install -r requirements-dev.txt
          }

      - name: Compile critical modules
        run: |
          python -m py_compile quality/ci_quality_gate.py
          python -m py_compile quality/release_readiness.py
          python -m py_compile scripts/run_quality_gate.py
          python -m py_compile scripts/run_release_readiness.py

      - name: Run tests
        run: python -m pytest

      - name: Runtime config validation
        run: python scripts/run_runtime_config_validation.py --export --name ci_runtime_config

      - name: Failure injection safety test
        run: python scripts/run_failure_injection.py --export --name ci_failure_injection

      - name: Scoped security audit
        run: python -u scripts/run_security_audit.py --export --scan-root security

      - name: Import smoke check
        run: |
          python -c "from infra.runtime_config_validator import validate_runtime_config; from observability.metrics_registry import build_metrics_snapshot; from security.environment_policy import evaluate_environment_policy; print('CI import smoke OK')"

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            artifacts/infra/
            artifacts/security/
            artifacts/quality/
          if-no-files-found: ignore