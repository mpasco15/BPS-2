global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus monitora ele mesmo.
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # Redis será monitorado via redis-exporter.
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Redpanda expõe métricas públicas na porta 9644.
  - job_name: "redpanda"
    metrics_path: /public_metrics
    static_configs:
      - targets: ["redpanda:9644"]

  # Aplicação Python futura.
  # Quando criarmos o bot, ele poderá expor métricas em /metrics na porta 8001.
  - job_name: "btc-polymarket-bot"
    static_configs:
      - targets: ["host.docker.internal:8001"]