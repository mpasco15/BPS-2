services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: btc-polymarket-timescaledb
    restart: unless-stopped

    mem_limit: 512m

    command:
      [
        "postgres",
        "-c", "shared_buffers=128MB",
        "-c", "work_mem=8MB",
        "-c", "maintenance_work_mem=64MB",
        "-c", "max_connections=30"
      ]

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-btc_polymarket_bot}
      POSTGRES_USER: ${POSTGRES_USER:-btc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-btc_password_dev}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/timescaledb/initdb:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-btc_user} -d ${POSTGRES_DB:-btc_polymarket_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: btc-polymarket-redis
    restart: unless-stopped

    mem_limit: 128m

    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--requirepass", "${REDIS_PASSWORD:-redis_password_dev}",
        "--maxmemory", "96mb",
        "--maxmemory-policy", "allkeys-lru"
      ]

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: btc-polymarket-redpanda
    restart: unless-stopped

    mem_limit: 768m

    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092

    ports:
      - "19092:19092"
      - "9644:9644"

    volumes:
      - redpanda_data:/var/lib/redpanda/data

    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy|true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    container_name: btc-polymarket-minio
    restart: unless-stopped

    mem_limit: 256m

    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}

    command: server /data --console-address ":9001"

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescale_data:
  redis_data:
  redpanda_data:
  minio_data: